{% extends "base.html" %}

{% block title %}Business Reports - IMS Dashboard{% endblock %}

{% block content %}
<div style="margin-bottom: 30px;">
    <h2>Business Intelligence Reports</h2>
    <hr>
    <div style="margin-bottom: 30px; display: flex; gap: 10px;">
        <button class="btn btn-primary" onclick="loadInventoryReport()">Low Stock Alert</button>
        <button class="btn btn-primary" onclick="loadSalesReport()">Revenue Overview</button>
        <button class="btn btn-primary" onclick="loadCustomerReport()">Top Customers</button>
        <button class="btn btn-primary" onclick="loadOrderReport()">Recent Activity</button>
    </div>
    <div id="reportContent" style="background:#fff; padding:20px; border:1px solid #ddd; border-radius:8px; min-height:250px;">
        <p style="color:#666;">Select a report from the menu above to analyze your data.</p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const reportDiv = document.getElementById('reportContent');
const startTable = (headers) => {
    let html = '<table style="width:100%; border-collapse:collapse; margin-top:15px;"><thead><tr style="text-align:left; border-bottom:2px solid #eee;">';
    headers.forEach(h => html += `<th style="padding:10px;">${h}</th>`);
    html += '</tr></thead><tbody>';
    return html;
};
async function loadInventoryReport() {
    reportDiv.innerHTML = "<p>Analyzing stock levels...</p>";
    try {
        const res = await fetch('/api/reports/inventory');
        const products = await res.json();
        let html = '<h3>Low Stock Alert (&lt; 5 units)</h3>';
        if (products.length === 0) {
            html += '<div style="padding: 20px; color: #155724; background: #d4edda; border-radius: 5px;">✓ All products are sufficiently stocked.</div>';
        } else {
            html += startTable(['ID', 'Product Name', 'Remaining Quantity']);
            products.forEach(p => {
                html += `<tr style=\"border-bottom: 1px solid #eee;\">\n                            <td style=\"padding: 10px;\">${p.id}</td>\n                            <td style=\"padding: 10px;\">${p.name}</td>\n                            <td style=\"padding: 10px; color: #dc3545; font-weight: bold;\">${p.quantity}</td>\n                         </tr>`;
            });
            html += '</tbody></table>';
        }
        reportDiv.innerHTML = html;
    } catch (err) { reportDiv.innerHTML = "Error loading data."; }
}
async function loadSalesReport() {
    reportDiv.innerHTML = "<p>Calculating revenue...</p>";
    try {
        const res = await fetch('/api/reports/sales');
        const data = await res.json();
        reportDiv.innerHTML = `
            <h3>Revenue Overview</h3>
            <div style=\"display: flex; gap: 20px; margin-top: 15px;\">
                <div style=\"padding: 25px; background: #e3f2fd; border-left: 5px solid #007bff; border-radius: 4px; flex: 1;\">
                    <small>TOTAL REVENUE</small><br>
                    <strong style=\"font-size: 28px;\">$${data.total_revenue.toLocaleString(undefined, {minimumFractionDigits: 2})}</strong>
                </div>
                <div style=\"padding: 25px; background: #f1f8e9; border-left: 5px solid #4caf50; border-radius: 4px; flex: 1;\">
                    <small>TOTAL ORDERS</small><br>
                    <strong style=\"font-size: 28px;\">${data.total_orders}</strong>
                </div>
            </div>`;
    } catch (err) { reportDiv.innerHTML = "Error loading sales data."; }
}
async function loadCustomerReport() {
    reportDiv.innerHTML = "<p>Ranking customers...</p>";
    try {
        const res = await fetch('/api/reports/customers');
        const customers = await res.json();
        let html = '<h3>Top Customers</h3>';
        html += startTable(['Customer Name', 'City', 'Orders Placed']);
        customers.forEach(c => {
            html += `<tr style=\"border-bottom: 1px solid #eee;\">\n                        <td style=\"padding: 10px;\">${c.name}</td>\n                        <td style=\"padding: 10px;\">${c.city}</td>\n                        <td style=\"padding: 10px; font-weight: bold;\">${c.order_count}</td>\n                     </tr>`;
        });
        html += '</tbody></table>';
        reportDiv.innerHTML = html;
    } catch (err) { reportDiv.innerHTML = "Error loading customer data."; }
}
async function loadOrderReport() {
    reportDiv.innerHTML = "<p>Fetching recent activity...</p>";
    try {
        const res = await fetch('/api/reports/orders');
        const orders = await res.json();
        let html = '<h3>Recent Orders</h3>';
        html += startTable(['Order ID', 'Customer', 'Date', 'Total', 'Status']);
        orders.forEach(o => {
            html += `<tr style=\"border-bottom: 1px solid #eee;\">\n                        <td style=\"padding: 10px;\">${o.id}</td>\n                        <td style=\"padding: 10px;\">${o.customer}</td>\n                        <td style=\"padding: 10px;\">${o.date}</td>\n                        <td style=\"padding: 10px;\">$${o.total.toFixed(2)}</td>\n                        <td style=\"padding: 10px;\">${o.status}</td>\n                     </tr>`;
        });
        html += '</tbody></table>';
        reportDiv.innerHTML = html;
    } catch (err) { reportDiv.innerHTML = "Error loading order data."; }
}
</script>
{% endblock %}
